<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Truth Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #02080b 0%, #1e293b 50%, #02080b 100%);
        }
        
        .glow-effect {
            animation: glow 3s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(125, 211, 252, 0.5); }
            to { text-shadow: 0 0 30px rgba(125, 211, 252, 0.8), 0 0 40px rgba(125, 211, 252, 0.6); }
        }
        
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .particle {
            position: absolute;
            background: rgba(125, 211, 252, 0.3);
            border-radius: 50%;
            animation: particle-float 10s infinite linear;
        }
        
        @keyframes particle-float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white overflow-hidden">
    <!-- Particles Background -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="particle w-2 h-2" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle w-3 h-3" style="left: 25%; animation-delay: 2s;"></div>
        <div class="particle w-2 h-2" style="left: 40%; animation-delay: 4s;"></div>
        <div class="particle w-4 h-4" style="left: 60%; animation-delay: 6s;"></div>
        <div class="particle w-2 h-2" style="left: 75%; animation-delay: 8s;"></div>
        <div class="particle w-3 h-3" style="left: 90%; animation-delay: 10s;"></div>
    </div>

    <!-- Main Content -->
    <div class="relative z-10 flex min-h-screen flex-col items-center justify-center px-4">
        <div class="text-center max-w-4xl mx-auto">
            <!-- Logo -->
            <div class="mb-8 float-animation">
                <div class="w-24 h-24 mx-auto bg-gradient-to-r from-[#7dd3fc] to-[#0ea5e9] rounded-2xl flex items-center justify-center shadow-lg shadow-[#7dd3fc]/50">
                    <svg class="w-16 h-16 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M7 2v11h3v9l7-12h-4l4-8z"/>
                    </svg>
                </div>
            </div>

            <!-- 404 Number -->
            <div class="mb-6">
                <h1 class="text-9xl md:text-[12rem] font-bold bg-gradient-to-r from-[#7dd3fc] via-white to-[#7dd3fc] bg-clip-text text-transparent glow-effect">
                    404
                </h1>
            </div>

            <!-- Error Message -->
            <div class="mb-8">
                <h2 class="text-3xl md:text-4xl font-bold mb-4 text-white">
                    This page could not be found
                </h2>
                <p class="text-lg md:text-xl text-gray-300 max-w-2xl mx-auto leading-relaxed">
                    It looks like you've wandered off the path. Don't worry, even truth seekers get lost sometimes. Let's get you back on track.
                </p>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center items-center mb-8">
                <a href="/" class="group inline-flex items-center gap-2 px-8 py-4 bg-gradient-to-r from-[#7dd3fc] to-[#0ea5e9] text-white font-semibold rounded-lg hover:from-[#0ea5e9] hover:to-[#7dd3fc] transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-[0_0_30px_rgba(125,211,252,0.5)]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    Go Home
                </a>

                <a href="/en/age-selection" class="group inline-flex items-center gap-2 px-8 py-4 bg-white/10 backdrop-blur-sm text-white font-semibold rounded-lg border border-white/20 hover:bg-white/20 transition-all duration-300 transform hover:scale-105">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    Explore Content
                </a>
            </div>

            <!-- Additional Help -->
            <div class="text-center">
                <p class="text-gray-400 mb-4">
                    Need help finding what you're looking for?
                </p>
                <div class="flex flex-wrap justify-center gap-3 text-sm">
                    <a href="/en/path" class="px-4 py-2 bg-white/5 rounded-lg hover:bg-white/10 transition-colors">
                        Learning Path
                    </a>
                    <a href="/en/truth-lab" class="px-4 py-2 bg-white/5 rounded-lg hover:bg-white/10 transition-colors">
                        Truth Lab
                    </a>
                    <a href="/en/spread-simulator" class="px-4 py-2 bg-white/5 rounded-lg hover:bg-white/10 transition-colors">
                        Spread Simulator
                    </a>
                </div>
            </div>

            <!-- Back Button -->
            <div class="mt-8">
                <button onclick="window.history.back()" class="inline-flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                    </svg>
                    Go Back
                </button>
            </div>
        </div>
    </div>

    <script>
        // Language detection and redirect
        const userLang = navigator.language || navigator.userLanguage;
        const isArabic = userLang.startsWith('ar');
        
        if (isArabic) {
            // Redirect to Arabic version if Arabic detected
            const currentPath = window.location.pathname;
            const arabicPath = currentPath.replace('/en/', '/ar/') || '/ar/';
            window.location.href = arabicPath;
        }
    </script>
</body>
</html>
