<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - TruthLab Kids</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f7fafb",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary": "#005c68",
                        "secondary-fixed-dim": "#f5be55",
                        "surface-container-high": "#e5e9ea",
                        "primary-fixed-dim": "#80d3e3",
                        "on-tertiary-fixed-variant": "#6c3a04",
                        "on-secondary-container": "#745200",
                        "secondary-fixed": "#ffdea8",
                        "inverse-on-surface": "#eef1f2",
                        "tertiary": "#7b4610",
                        "surface-container-highest": "#e0e3e4",
                        "on-primary-fixed": "#001f25",
                        "surface-container": "#ebeeef",
                        "on-surface": "#181c1d",
                        "on-secondary-fixed": "#271900",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "outline": "#6e797b",
                        "surface-variant": "#e0e3e4",
                        "on-primary-fixed-variant": "#004e59",
                        "outline-variant": "#bec8cb",
                        "tertiary-fixed": "#ffdcc3",
                        "on-tertiary-container": "#ffe9da",
                        "on-primary": "#ffffff",
                        "secondary-container": "#fec65d",
                        "primary-container": "#0d7685",
                        "on-secondary-fixed-variant": "#5e4200",
                        "on-primary-container": "#c8f5ff",
                        "secondary": "#7c5800",
                        "primary-fixed": "#a0efff",
                        "on-surface-variant": "#3e484b",
                        "error": "#ba1a1a",
                        "on-background": "#181c1d",
                        "inverse-primary": "#80d3e3",
                        "tertiary-fixed-dim": "#ffb77c",
                        "surface-container-low": "#f1f4f5",
                        "surface-dim": "#d7dadb",
                        "background": "#f7fafb",
                        "surface-bright": "#f7fafb",
                        "on-tertiary-fixed": "#2e1500",
                        "inverse-surface": "#2d3132",
                        "error-container": "#ffdad6",
                        "surface-tint": "#006876",
                        "tertiary-container": "#985d27",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "xl": "48px",
                        "gutter": "24px",
                        "md": "16px",
                        "xs": "4px",
                        "lg": "24px",
                        "sm": "8px",
                        "margin": "32px"
                    },
                    "fontFamily": {
                        "h2": ["Lexend"],
                        "body-lg": ["Lexend"],
                        "h1": ["Lexend"],
                        "button": ["Lexend"],
                        "h3": ["Lexend"],
                        "body-md": ["Lexend"],
                        "label-caps": ["Lexend"]
                    },
                    "fontSize": {
                        "h2": ["32px", { "lineHeight": "1.25", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h1": ["40px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "button": ["16px", { "lineHeight": "1", "fontWeight": "500" }],
                        "h3": ["24px", { "lineHeight": "1.3", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased">
<!-- Progress Indicator -->
<header class="w-full py-lg px-gutter flex justify-center items-center fixed top-0 left-0 z-50 bg-surface/80 backdrop-blur-sm border-b border-surface-container-highest">
<div class="flex items-center gap-base">
<div class="w-3 h-3 rounded-full bg-primary ring-2 ring-primary ring-offset-2 ring-offset-surface"></div>
<div class="w-8 h-1 bg-surface-container-highest rounded-full"></div>
<div class="w-3 h-3 rounded-full bg-surface-container-highest"></div>
<div class="w-8 h-1 bg-surface-container-highest rounded-full"></div>
<div class="w-3 h-3 rounded-full bg-surface-container-highest"></div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-gutter pt-[100px] pb-xl max-w-4xl mx-auto w-full">
<!-- Step 1: Language Selection -->
<section class="w-full flex flex-col items-center space-y-xl mb-xl">
<div class="text-center space-y-sm max-w-lg">
<h1 class="font-h1 text-h1 text-on-surface">Select your language</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Choose the language you prefer to explore the lab with.</p>
</div>
<div class="grid grid-cols-2 md:grid-cols-4 gap-md w-full max-w-3xl">
<!-- EN -->
<button class="flex flex-col items-center justify-center p-lg bg-surface-container-lowest border-2 border-primary rounded-xl shadow-sm hover:bg-surface-container-low transition-colors group">
<span class="font-h2 text-h2 text-primary mb-sm">EN</span>
<span class="font-button text-button text-on-surface group-hover:text-primary transition-colors">English</span>
</button>
<!-- AR -->
<button class="flex flex-col items-center justify-center p-lg bg-surface-container-lowest border border-outline-variant rounded-xl hover:border-primary hover:bg-surface-container-low transition-all group">
<span class="font-h2 text-h2 text-on-surface-variant group-hover:text-primary transition-colors mb-sm">ع</span>
<span class="font-button text-button text-on-surface group-hover:text-primary transition-colors">العربية</span>
</button>
<!-- DE -->
<button class="flex flex-col items-center justify-center p-lg bg-surface-container-lowest border border-outline-variant rounded-xl hover:border-primary hover:bg-surface-container-low transition-all group">
<span class="font-h2 text-h2 text-on-surface-variant group-hover:text-primary transition-colors mb-sm">DE</span>
<span class="font-button text-button text-on-surface group-hover:text-primary transition-colors">Deutsch</span>
</button>
<!-- KO -->
<button class="flex flex-col items-center justify-center p-lg bg-surface-container-lowest border border-outline-variant rounded-xl hover:border-primary hover:bg-surface-container-low transition-all group">
<span class="font-h2 text-h2 text-on-surface-variant group-hover:text-primary transition-colors mb-sm">한국</span>
<span class="font-button text-button text-on-surface group-hover:text-primary transition-colors">한국어</span>
</button>
</div>
</section>
<div class="w-full h-px bg-surface-container-highest my-xl max-w-2xl"></div>
<!-- Step 2: Age Selection -->
<section class="w-full flex flex-col items-center space-y-xl">
<div class="text-center space-y-sm max-w-lg">
<h2 class="font-h2 text-h2 text-on-surface">Choose your level</h2>
<p class="font-body-md text-body-md text-on-surface-variant">This helps us tailor the scholarly tools for you.</p>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-lg w-full">
<!-- Explorers (6-9) -->
<button class="flex flex-col items-center p-xl bg-surface-container-lowest border border-outline-variant rounded-xl hover:border-primary hover:shadow-[0_4px_12px_rgba(0,0,0,0.05)] transition-all group relative overflow-hidden">
<div class="w-16 h-16 bg-surface-container rounded-full flex items-center justify-center mb-md group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-[32px] text-on-surface-variant group-hover:text-on-primary-container transition-colors">explore</span>
</div>
<h3 class="font-h3 text-h3 text-on-surface mb-xs group-hover:text-primary transition-colors">Explorers</h3>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Ages 6 - 9</p>
</button>
<!-- Investigators (10-13) -->
<button class="flex flex-col items-center p-xl bg-surface-container-lowest border-2 border-primary rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] relative overflow-hidden group">
<div class="absolute top-md right-md">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-[32px] text-on-primary-container">search</span>
</div>
<h3 class="font-h3 text-h3 text-primary mb-xs">Investigators</h3>
<p class="font-label-caps text-label-caps text-primary uppercase tracking-wider opacity-80">Ages 10 - 13</p>
</button>
<!-- Scholars (14-17) -->
<button class="flex flex-col items-center p-xl bg-surface-container-lowest border border-outline-variant rounded-xl hover:border-primary hover:shadow-[0_4px_12px_rgba(0,0,0,0.05)] transition-all group relative overflow-hidden">
<div class="w-16 h-16 bg-surface-container rounded-full flex items-center justify-center mb-md group-hover:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-[32px] text-on-surface-variant group-hover:text-on-primary-container transition-colors">school</span>
</div>
<h3 class="font-h3 text-h3 text-on-surface mb-xs group-hover:text-primary transition-colors">Scholars</h3>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Ages 14 - 17</p>
</button>
</div>
</section>
<!-- Navigation Actions -->
<div class="mt-xl w-full max-w-3xl flex justify-between items-center pt-lg">
<button class="font-button text-button text-on-surface-variant hover:text-on-surface px-md py-sm rounded-lg hover:bg-surface-container transition-colors flex items-center gap-xs">
<span class="material-symbols-outlined">arrow_back</span>
                Back
            </button>
<button class="font-button text-button text-on-primary bg-primary hover:bg-surface-tint px-xl py-md rounded-lg shadow-sm transition-colors flex items-center gap-sm">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
</body></html>
